<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="nebrixlogo.png">
<title>Nebrix - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    border-radius: 0 !important; 
  }
  
  :root {
    --green: #00b06f; 
    --green-dark: #008a56;
    --blue-nav: #00b06f; 
    --bg: #e2e2e2;      
    --bg-panel: #ffffff;
    --text: #1a1a1a; 
    --text-light: #555555; 
    --muted: #767676;
    --border: #ffffff; 
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Source Sans 3','Arial',sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }

  /* NAVIGATION */
  #nebrix-nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: stretch; height: 44px;
    background: var(--blue-nav); box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .logo { 
    display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 1rem; color: #fff; 
    padding: 0 16px; background: rgba(0,0,0,0.08); border-right: 1px solid rgba(255,255,255,0.2); 
    text-transform: uppercase; 
  }
  .logo img { width: 20px; height: 20px; object-fit: contain; filter: brightness(0) invert(1); }
  
  .nav-links { display: flex; align-items: stretch; }
  .nav-links a { 
    display: flex; align-items: center; padding: 0 14px; font-size: 0.84rem; font-weight: 700; 
    color: #fff; border-right: 1px solid rgba(255,255,255,0.1); 
    text-transform: uppercase; transition: background 0.1s; 
  }
  .nav-links a:hover { background: rgba(0,0,0,0.1); }
  
  .nav-right { display: flex; align-items: stretch; margin-left: auto; }
  .btn-settings { 
    display: flex; align-items: center; background: rgba(255,255,255,0.15); border: none; 
    cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 700; 
    color: #fff; padding: 0 14px; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,0.1);
  }

  /* WELCOME BANNER - Removed Black, using White/Green mix */
  .welcome-banner {
    background: var(--bg-panel); 
    border-bottom: 4px solid var(--green);
    padding: 30px 32px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03);
  }
  .welcome-text h1 { font-size: 1.5rem; font-weight: 900; color: var(--text); text-transform: uppercase; }
  .welcome-text h1 span { color: var(--green); }
  .welcome-text p { color: var(--muted); font-size: 0.9rem; font-weight: 600; }
  
  .btn-primary { 
    background: var(--green); border: none; cursor: pointer; font-family: inherit; 
    font-size: 0.82rem; font-weight: 700; color: #fff; padding: 12px 24px; 
    text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; 
  }
  .btn-primary:hover { background: var(--green-dark); }
  
  .btn-secondary { 
    background: var(--bg); border: 1px solid #ccc; cursor: pointer; font-family: inherit; 
    font-size: 0.82rem; font-weight: 700; color: var(--text); padding: 12px 24px; 
    text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; 
  }

  /* MAIN CONTENT AREA */
  .main { max-width: 1200px; margin: 0 auto; padding: 30px 20px 60px; }

  .section { margin-bottom: 30px; }
  .section-header { 
    display: flex; align-items: center; justify-content: space-between; 
    margin-bottom: 15px; padding-bottom: 8px; border-bottom: 3px solid var(--green); 
  }
  .section-title { font-size: 0.9rem; font-weight: 900; color: var(--text); text-transform: uppercase; }
  .section-meta { font-size: 0.78rem; color: var(--muted); font-weight: 700; text-transform: uppercase; }

  /* GAME CARDS */
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
  .game-card { background: #fff; border: 1px solid #ddd; transition: transform 0.1s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  .game-card:hover { transform: translateY(-2px); border-color: var(--green); }
  
  /* Thumbnail changed from Black to a soft Blue-Gray gradient */
  .game-thumb { 
    width: 100%; aspect-ratio: 16/9; 
    background: linear-gradient(135deg, #287eff, #f3f4f6); 
    display: flex; align-items: center; justify-content: center; font-size: 2rem; 
  }
  
  .game-info { padding: 15px; }
  .game-name { font-size: 0.9rem; font-weight: 900; color: var(--text); text-transform: uppercase; }
  .game-author { font-size: 0.75rem; color: var(--green-dark); font-weight: 700; margin: 4px 0 8px; text-transform: uppercase; }
  .game-desc { font-size: 0.8rem; color: var(--text-light); line-height: 1.5; height: 3em; overflow: hidden; }
  
  .game-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .game-plays { font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; }
  .btn-play { background: var(--green); color: #fff; padding: 6px 14px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; }

  /* QUICK LINKS */
  .quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .quick-card { background: #fff; border: 1px solid #ddd; padding: 16px; display: flex; align-items: center; gap: 12px; transition: 0.1s; }
  .quick-card:hover { border-color: var(--green); background: #f9f9f9; }
  .quick-icon { font-size: 1.3rem; }
  .quick-label { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; color: var(--text); }

  /* FOOTER - Match Landing Page Light */
  footer { 
    background: #f8f8f8; padding: 40px 30px; border-top: 4px solid var(--green); 
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; 
  }
  .footer-left { display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--text); text-transform: uppercase; font-size: 1rem; }
  .footer-left img { width: 20px; opacity: 0.8; }
  .footer-copy { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; font-weight: 700; }

  .skeleton { background: #eee; height: 180px; }
</style>
</head>
<body>

<nav id="nebrix-nav"></nav>

<div class="welcome-banner">
  <div class="welcome-text">
    <h1 id="welcome-heading">Welcome Back, <span>Player!</span></h1>
    <p>Ready to build something amazing today?</p>
  </div>
  <div class="welcome-actions">
    <a href="https://github.com/Puppyrjcw/Nebrix/releases" class="btn-primary" target="_blank">↓ Get Studio</a>
    <a href="documentation.html" class="btn-secondary">📖 Documentation</a>
  </div>
</div>

<div class="main">
  <div class="section">
    <div class="section-header">
      <span class="section-title">🗂️ My Published Games</span>
      <span class="section-meta" id="my-games-meta"></span>
    </div>
    <div id="my-games-grid" class="game-grid">
        <div style="grid-column: 1/-1; padding: 30px; text-align: center; border: 2px dashed #ccc; background: rgba(255,255,255,0.5);">
            <p style="text-transform: uppercase; font-weight: 900; color: #999;">No games published yet</p>
        </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">🌐 All Community Games</span>
      <span class="section-meta" id="pub-games-meta">Syncing...</span>
    </div>
    <div id="pub-games-grid" class="game-grid">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><span class="section-title">🔗 Resources</span></div>
    <div class="quick-grid">
      <a href="documentation.html" class="quick-card"><span class="quick-icon">📖</span><div class="quick-label">Docs</div></a>
      <a href="progression.html" class="quick-card"><span class="quick-icon">🗺️</span><div class="quick-label">Roadmap</div></a>
      <a href="https://discord.com/invite/XTa4GwaJFY" class="quick-card" target="_blank"><span class="quick-icon">💬</span><div class="quick-label">Discord</div></a>
      <a href="settings.html" class="quick-card"><span class="quick-icon">⚙️</span><div class="quick-label">Settings</div></a>
    </div>
  </div>
</div>

<footer>
  <div class="footer-left"><img src="nebrixlogo.png" alt="Nebrix"><span>Nebrix Platforms</span></div>
  <div class="footer-copy">© 2026 Nebrix Platforms Inc.</div>
</footer>

<script src="nebrix.js"></script>
<script>
// Logic remains identical
const API_BASE = 'https://api.nebrixgames.com';
const THUMBS = ['🏰','🚀','⚔️','🌍','🏎️','🧱','🌊','🎯','🤖'];

function buildGameCard(game,index){
  const emoji=THUMBS[index%THUMBS.length];
  const card=document.createElement('div');
  card.className='game-card';
  card.innerHTML=`
    <div class="game-thumb"><span>${emoji}</span></div>
    <div class="game-info">
      <div class="game-name">${game.name}</div>
      <div class="game-author">by ${game.author || 'User'}</div>
      <div class="game-desc">${game.description || 'Nebrix community content.'}</div>
      <div class="game-footer">
        <span class="game-plays">${game.play_count || 0} PLAYS</span>
        <a class="btn-play" href="nebrix://${encodeURIComponent(game.game_id)}">▶ Play</a>
      </div>
    </div>`;
  return card;
}

async function loadPublishedGames(){
  const grid=document.getElementById('pub-games-grid'),meta=document.getElementById('pub-games-meta');
  try {
    const res=await fetch(`${API_BASE}/published`,{cache:'no-store'});
    const data=await res.json();
    const games=Array.isArray(data)?data:(data.games||[]);
    grid.innerHTML='';
    meta.textContent=games.length+' games';
    games.forEach((g,i)=>grid.appendChild(buildGameCard(g,i)));
  } catch {
    grid.innerHTML='<p style="grid-column:1/-1; text-align:center;">Server Unreachable</p>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if(typeof renderNav==='function') renderNav('home');
  const username=typeof getUsername==='function'?getUsername():null;
  if(username) document.getElementById('welcome-heading').innerHTML=`Welcome back, <span>${username}</span>`;
  loadPublishedGames();
});
</script>
</body>
</html>
