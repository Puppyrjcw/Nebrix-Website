<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="nebrixlogo.png">
    <title>Nebrix - Game Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="nebrix.js"></script>
    <style>
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            border-radius: 0 !important; 
        }
        
        /* Forced specificity using body tag to prevent nebrix.js from overwriting colors */
        body, :root {
            --primary: #2b78e4 !important; 
            --primary-dark: #1c5bba !important;
            --bg: #e2e2e2 !important;      
            --bg-panel: #ffffff !important;
            --text: #1a1a1a !important; 
            --muted: #767676 !important;
            --blue-link: #0066cc !important;
            --white: #ffffff !important;
            --btn-green: #00b06f !important;
            --btn-green-dark: #008a56 !important;
            --nav-bg: #2b78e4 !important;
        }

        body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* NAVIGATION BAR */
        #nebrix-nav {
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: stretch; height: 44px;
            background: var(--primary) !important; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        #nebrix-nav .logo { 
            display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 1rem; color: #fff; 
            padding: 0 16px; background: rgba(0,0,0,0.1); border-right: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        #nebrix-nav .logo img { width: 20px; height: 20px; object-fit: contain; }

        #nebrix-nav .nav-links { display: flex; }
        #nebrix-nav .nav-links a { 
            display: flex; align-items: center; padding: 0 14px; 
            font-size: 0.84rem; font-weight: 700; color: var(--white); 
            border-right: 1px solid rgba(255,255,255,0.1); 
            text-transform: uppercase; transition: background 0.2s; 
        }
        #nebrix-nav .nav-links a:hover { background: rgba(0,0,0,0.1); }
        
        #nebrix-nav .nav-right { display: flex; margin-left: auto; }
        #nebrix-nav .btn-login {
            background: transparent; border: none; color: var(--white);
            padding: 0 20px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; font-size: 0.8rem; transition: background 0.2s;
        }
        #nebrix-nav .btn-login:hover { background: rgba(0,0,0,0.1); }

        /* MAIN LAYOUT */
        .main { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        .game-header { margin-bottom: 20px; }
        .game-title-big { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .game-creator { font-size: 1rem; font-weight: 700; color: var(--muted); margin-top: 8px; }
        .game-creator span { color: var(--blue-link); }

        .top-row { display: grid; grid-template-columns: 1.8fr 1fr; background: var(--bg-panel); border-bottom: 6px solid var(--primary); }
        
        .game-media { background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
        .game-media img { width: 40%; opacity: 0.7; }

        .play-controls { padding: 30px; display: flex; flex-direction: column; border-left: 1px solid #eee; }
        .btn-play-big { 
            background: var(--btn-green) !important; color: #fff; border: none; padding: 18px; 
            font-size: 1.8rem; font-weight: 900; text-transform: uppercase; cursor: pointer;
            margin-bottom: 25px; transition: background 0.2s;
        }
        .btn-play-big:hover { background: var(--btn-green-dark) !important; }

        .stats-list { list-style: none; font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        .stats-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .stats-list li span:last-child { color: var(--text); }

        .description-box { background: #fff; padding: 30px; margin-top: 20px; border-bottom: 4px solid #ccc; }
        .section-label { font-weight: 900; text-transform: uppercase; border-bottom: 3px solid var(--primary); padding-bottom: 5px; margin-bottom: 15px; display: inline-block; }

        /* ROBLOX-STYLE LAUNCHER MODAL */
        .launcher-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 2000;
            align-items: center; justify-content: center;
        }
        .launcher-box {
            background: var(--bg-panel);
            padding: 35px;
            max-width: 500px; width: 90%;
            border: 1px solid #ccc;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
            text-align: center;
        }
        .launcher-title { 
            font-size: 1.6rem; font-weight: 900; text-transform: uppercase; 
            margin-bottom: 15px; letter-spacing: 0.5px;
        }
        
        /* Simple CSS loading dots to emulate a launcher check */
        .launcher-status {
            font-size: 1.1rem; font-weight: 700; color: var(--primary);
            margin-bottom: 20px; text-transform: uppercase;
        }
        .launcher-status::after {
            content: '...';
            display: inline-block;
            width: 15px;
            text-align: left;
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }

        .launcher-divider {
            height: 1px; background: #e0e0e0; margin: 20px 0;
        }
        .launcher-text { font-size: 0.95rem; margin-bottom: 20px; color: var(--muted); line-height: 1.5; }
        
        .btn-download-client {
            display: inline-block; background: var(--btn-green) !important; color: #fff !important;
            padding: 12px 30px; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; 
            transition: background 0.2s; text-align: center; margin-bottom: 15px;
            cursor: pointer; border: none; width: 100%;
        }
        .btn-download-client:hover { background: var(--btn-green-dark) !important; }
        
        .btn-cancel-launcher {
            background: transparent; border: 1px solid #bbb; color: var(--text);
            text-transform: uppercase; font-weight: 700; font-size: 0.85rem; 
            cursor: pointer; padding: 10px 20px; width: 100%; transition: background 0.2s;
        }
        .btn-cancel-launcher:hover { background: #f5f5f5; }
    </style>
</head>
<body>

<nav id="nebrix-nav"></nav>    

<div class="main">
    <div class="game-header">
        <h1 id="display-name" class="game-title-big">Loading Game...</h1>
        <p class="game-creator">By <span id="display-author">---</span></p>
    </div>

    <div class="top-row">
        <div class="game-media">
            <img src="nebrixlogo.png" alt="Nebrix Logo">
        </div>
        <div class="play-controls">
            <button class="btn-play-big" onclick="launchGame()">▶ Play</button>
            <ul class="stats-list">
                <li><span>Active</span><span id="stat-active">0</span></li>
                <li><span>Visits</span><span id="stat-visits">0</span></li>
                <li><span>Created</span><span id="stat-created">---</span></li>
            </ul>
        </div>
    </div>

    <div class="description-box">
        <div class="section-label">Description</div>
        <p id="display-desc" style="line-height: 1.6;">Fetching game data from Nebrix servers...</p>
    </div>
</div>

<!-- Roblox-Style Launcher Frame Overlay -->
<div id="launcher-modal" class="launcher-modal">
    <div class="launcher-box">
        <h2 class="launcher-title">Nebrix is Loading</h2>
        <div class="launcher-status">Starting Game Launcher</div>
        
        <div class="launcher-divider"></div>
        
        <p class="launcher-text">If the game protocol doesn't launch automatically, you may need to install the desktop application client.</p>
        
        <!-- Point this href directly to your GitHub Repository/Releases -->
        <a href="https://github.com/Puppyrjcw/Nebrix/releases/tag/NebrixStudioV0.2" target="_blank" class="btn-download-client">Download Nebrix</a>
        
        <button class="btn-cancel-launcher" onclick="closeLauncher()">Cancel</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    if (typeof renderNav === "function") {
        renderNav("home"); 
    }

    const params = new URLSearchParams(window.location.search);
    const gameId = params.get("id");

    if (!gameId) {
        document.getElementById("display-name").textContent = "No Game ID Provided";
        document.getElementById("display-desc").textContent = "Please select a game from the home page.";
        return;
    }

    try {
        const endpoint = typeof API_BASE !== "undefined" ? API_BASE : (typeof API !== "undefined" ? API : "https://api.nebrixgames.com");
        const res = await fetch(`${endpoint}/published`); 
        const data = await res.json();
        
        const games = Array.isArray(data) ? data : (data.games || []);
        const game = games.find(g => g.game_id === gameId);

        if (game) {
            document.getElementById("display-name").textContent = game.name;
            document.getElementById("display-author").textContent = game.author;
            document.getElementById("display-desc").textContent = game.description || "No description provided.";
            document.getElementById("stat-visits").textContent = game.play_count || 0;
            
            if (game.created_at) {
                const date = new Date(game.created_at * 1000).toLocaleDateString();
                document.getElementById("stat-created").textContent = date;
            }
        } else {
            document.getElementById("display-name").textContent = "Game Not Found";
            document.getElementById("display-desc").textContent = "The requested game ID does not exist on Nebrix.";
        }
    } catch (e) {
        console.error("Nebrix API Error:", e);
        document.getElementById("display-desc").textContent = "Failed to connect to Nebrix servers.";
    }
});

function launchGame() {
    const params = new URLSearchParams(window.location.search);
    const gameId = params.get("id");

    if (!gameId) {
        alert("Cannot launch game: No Game ID found in the URL.");
        return;
    }

    if (typeof isLoggedIn === "function" && !isLoggedIn()) {
        if (typeof showLoginModal === "function") {
            showLoginModal();
        } else {
            alert("Please log in to the website before playing!");
        }
        return;
    }

    let username = "Guest";
    if (typeof getUsername === "function") {
        username = getUsername();
    } else {
        username = localStorage.getItem("nebrix_username") || "Guest";
    }

    if (!username || username === "Guest") {
        alert("Error: Could not resolve your username. Please re-login.");
        return;
    }

    let deepLink = `nebrix://play/${gameId}/${encodeURIComponent(username)}`;
    window.location.href = deepLink;

    // Open the Roblox-style platform prompt immediately when checking deep link
    document.getElementById("launcher-modal").style.display = "flex";
}

function closeLauncher() {
    document.getElementById("launcher-modal").style.display = "none";
}
</script>

</body>
</html>
